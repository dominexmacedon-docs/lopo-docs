<!DOCTYPE html>
<html>
<head>
    <title>Server Diagnostics</title>
</head>
<body>
    <h1>Server Environment Diagnostics</h1>
    <table border="1" cellpadding="5">
        <tr>
            <td><strong>Machine Local IP</strong></td>
            <td>{{IP}}</td>
        </tr>
        <tr>
            <td><strong>Server System Time</strong></td>
            <td>{{TIME}}</td>
        </tr>
        <tr>
            <td><strong>Environment Mode</strong></td>
            <td>{{ENV}}</td>
        </tr>
    </table>
</body>
</html>
