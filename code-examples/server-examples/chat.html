<!DOCTYPE html>
<html>
<head>
    <title>Live Console Socket</title>
</head>
<body>
    <h1>Live Console Socket</h1>
    <p>Waiting for broadcast actions...</p>
    <script>
        let ws = new WebSocket('ws://localhost:8080');
        ws.onmessage = (e) => {
            alert("Broadcast from Lopo server: " + e.data);
        };
    </script>
</body>
</html>
