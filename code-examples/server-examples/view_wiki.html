<!DOCTYPE html>
<html>
<head>
    <title>Wikipedia Knowledge Explorer</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #eceff1; }
        .search-box { background: white; padding: 25px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input[type="text"] { width: 70%; padding: 12px; font-size: 16px; border: 1px solid #b0bec5; border-radius: 4px; }
        input[type="submit"] { padding: 12px 25px; font-size: 16px; background: #37474f; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; margin-top: 25px; border-collapse: collapse; background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #cfd8dc; }
        th { background: #546e7a; color: white; }
        a { color: #00838f; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="search-box">
        <h2>Lopo API Proxy — Wikipedia External Bridge</h2>
        <form action="/search" method="GET">
            <input type="text" name="q" placeholder="Type topic search terms here..." required/>
            <input type="submit" value="Query Wikipedia Engine" />
        </form>
        <p>Active Filtering Metric Key Focus: <strong>{{ searchQuery }}</strong></p>
    </div>

    <table>
        <thead>
            <tr><th style="width: 25%;">Result Match Matrix</th><th>Article abstract Summary Preview</th></tr>
        </thead>
        <tbody>
            {{ resultsHtml }}
        </tbody>
    </table>
</body>
</html>
