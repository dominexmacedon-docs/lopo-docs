<!DOCTYPE html>
<html>
<head>
    <title>Local Storage Transaction Logger</title>
    <style>
        body { font-family: monospace; background: #263238; color: #80cbc4; margin: 40px; }
        .interface-card { background: #37474f; border: 2px solid #004d40; border-radius: 5px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input[type="text"] { width: 60%; background: #263238; border: 1px solid #004d40; color: #fff; padding: 10px; font-family: monospace; }
        input[type="submit"] { background: #004d40; color: #80cbc4; border: 1px solid #80cbc4; padding: 10px 20px; cursor: pointer; }
        .terminal-stream { background: #1a237e; border-left: 5px solid #29b6f6; color: #e1f5fe; padding: 20px; font-size: 13px; line-height: 1.6; max-height: 300px; overflow-y: auto; }
        h2 { color: #ffffff; margin-top: 0; }
    </style>
</head>
<body>
    <div class="interface-card">
        <h2>Local File System Audit Transaction Stream</h2>
        <form action="/log" method="POST">
            <input type="text" name="entry" placeholder="Type event action log message description..." required />
            <input type="submit" value="Commit Write Frame" />
        </form>
    </div>

    <div class="interface-card">
        <h2>Active Transaction File State (system_activity_ledger.txt)</h2>
        <div class="terminal-stream">
            {{ fileLogs }}
        </div>
    </div>
</body>
</html>
